version: '3.8'

services:
  exam-practice:
    build: ..
    container_name: exam-practice
    ports:
      - "8000:8000"
    volumes:
      # Persist database
      - ./instance:/app/instance
      # Persist temp files (optional, for C code compilation)
      - ./temp:/app/temp
      # Mount exams config + questions externally to add exams without rebuild
      - ../exams.json:/app/exams.json
      - ../questions:/app/questions
    environment:
      # Set FLASK_SECRET_KEY to a real random value before deploying
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY:-your-secret-key-change-me}
      - DEBUG=False
      # When behind Cloudflare Tunnel / reverse proxy, leave FORCE_HTTPS=false
      # so Flask-Talisman doesn't redirect-loop on plain-HTTP traffic.
      - FORCE_HTTPS=${FORCE_HTTPS:-false}
      - DATABASE_URL=sqlite:///instance/practice.db
      - LOG_LEVEL=INFO
      - MAX_CODE_EXECUTION_TIME=3
      - MAX_MEMORY_MB=50
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
